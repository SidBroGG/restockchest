name: Build

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Generate data
        run: ./gradlew runData

      - name: Build jar
        run: ./gradlew build

      - name: Collect jar
        run: |
          mkdir -p release
          # Find the compiled jar, ignoring sources and dev jars
          JAR_PATH=$(find build/libs -maxdepth 1 -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" ! -name "*-dev.jar" | head -n 1)
          
          # Check if the workflow was triggered by a tag push
          if [[ ${{ github.ref }} == refs/tags/* ]]; then
            # Copy and append the tag name to the file
            cp "$JAR_PATH" "release/restockchest-${{ github.ref_name }}.jar"
          else
            # Default copy for standard commits
            cp "$JAR_PATH" release/
          fi

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: restockchest-jar
          path: release/*.jar
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/*.jar --title "${GITHUB_REF_NAME}" --notes "Automated build"